<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vacation Policy Quiz</title>
  <style>
    :root{--navy:#0b2858;--blue:#0b5ee8;--green:#169447;--red:#d7333f;--muted:#5b6f8d;--line:#dfe7f2;--soft:#f6f9fe}
    *{box-sizing:border-box}body{margin:0;color:var(--navy);background:#f8fbff;font-family:"Plus Jakarta Sans","Segoe UI",Arial,sans-serif}.page{max-width:1120px;margin:auto;padding:24px}
    .hero{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:24px 26px;border:1px solid #d8e5f5;border-radius:15px;background:linear-gradient(120deg,#f7fbff,#edf5ff)}.hero-copy{display:flex;align-items:center;gap:18px}.hero-icon{display:grid;width:58px;height:58px;flex:0 0 58px;place-items:center;color:#fff;border-radius:15px;background:linear-gradient(135deg,#7752ef,#5131c8);box-shadow:0 9px 20px #6743de2b}.hero-icon svg{width:31px;fill:none;stroke:currentColor;stroke-width:2}.hero h1{margin:0;font-size:26px}.hero p{margin:6px 0 0;color:var(--muted);line-height:1.5}.progress-label{min-width:125px;color:var(--muted);font-size:14px;font-weight:700;text-align:right}.progress{height:7px;margin-top:8px;overflow:hidden;border-radius:10px;background:#dce6f4}.progress span{display:block;width:0;height:100%;background:linear-gradient(90deg,#0b65ed,#6a50e6);transition:.2s}
    .instructions{display:flex;gap:10px;margin:18px 0;padding:13px 16px;color:#3f5b80;font-size:14px;line-height:1.5;border:1px solid #dce8f8;border-radius:10px;background:#f4f8ff}.instructions strong{color:#164fa9}
    .question{margin:14px 0;padding:20px;border:1px solid var(--line);border-radius:13px;background:#fff;box-shadow:0 2px 8px #24437d0a}.question h2{display:flex;gap:12px;margin:0 0 16px;font-size:16px;line-height:1.5}.number{display:grid;width:29px;height:29px;flex:0 0 29px;place-items:center;color:#white;font-size:13px;border-radius:8px;background:#0b5ee8}
    .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-left:41px}.option{position:relative;display:flex;align-items:flex-start;gap:10px;min-height:48px;padding:12px 13px;color:#334d70;font-size:14px;line-height:1.45;cursor:pointer;border:1px solid #dbe4f0;border-radius:9px;background:#fbfdff}.option:hover{border-color:#9dbff0;background:#f4f8ff}.option input{margin:3px 0 0;accent-color:#0b5ee8}.option.selected{color:#123c78;border-color:#76a8ef;background:#eef5ff}.option.correct{color:#126733;border-color:#76c892;background:#eefaf2}.option.incorrect{color:#9a2630;border-color:#e2959c;background:#fff2f3}.answer-note{display:none;margin:14px 0 0 41px;padding:10px 13px;color:#305170;font-size:13px;border-radius:8px;background:#f1f6fc}.question.reviewed .answer-note{display:block}
    .actions{position:sticky;bottom:0;z-index:3;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:20px;padding:16px 18px;border:1px solid #d9e3f0;border-radius:12px;background:#ffffffed;box-shadow:0 -6px 24px #173c6920;backdrop-filter:blur(8px)}.actions p{margin:0;color:var(--muted);font-size:14px}.buttons{display:flex;gap:10px}.buttons button{min-height:44px;padding:0 20px;font:inherit;font-weight:700;cursor:pointer;border-radius:8px}.reset{color:#405776;border:1px solid #cbd7e6;background:#white}.submit{color:#white;border:1px solid #0856d8;background:linear-gradient(135deg,#1768f2,#064aca);box-shadow:0 7px 16px #0d55dd30}.result{display:none;margin:18px 0;padding:22px;text-align:center;border:1px solid #cde2f8;border-radius:13px;background:linear-gradient(120deg,#f5faff,#eef6ff)}.result.show{display:block}.result strong{display:block;font-size:30px;color:#0b5ee8}.result span{color:var(--muted)}
    @media(max-width:700px){.page{padding:14px}.hero{align-items:flex-start;flex-direction:column;padding:19px}.hero h1{font-size:22px}.progress-label{width:100%;text-align:left}.options{grid-template-columns:1fr;margin-left:0}.answer-note{margin-left:0}.question{padding:16px}.actions{align-items:stretch;flex-direction:column}.buttons{width:100%}.buttons button{flex:1}}
  </style>
</head>
<body>
  <main class="page">
    <header class="hero"><div class="hero-copy"><div class="hero-icon"><svg viewBox="0 0 24 24"><path d="M6 3h12v18H6z"/><path d="M9 8h6M9 12h6M9 16h3"/><path d="m14 16 1.4 1.4L18 14.8"/></svg></div><div><h1>Vacation Policy Quiz</h1><p>Check your understanding of the Vacation Policy.</p></div></div><div class="progress-label"><span id="progressText">0 of 0 answered</span><div class="progress"><span id="progressBar"></span></div></div></header>
    <div class="instructions"><strong>Instructions:</strong><span>Select one answer for each question. Submit when complete to view your score and review the correct answers.</span></div>
    <div class="result" id="result" role="status"></div><form id="quiz"></form>
    <div class="actions"><p id="actionText">Answer all questions before submitting.</p><div class="buttons"><button class="reset" id="reset" type="button">Reset</button><button class="submit" id="submit" type="button">Submit Quiz</button></div></div>
  </main>
  <script>
    const questions = [["Vacation is applicable to which category of staff?",["All teaching staff","Only confirmed faculty","Only probationary staff","Technical staff"],1],["How many vacation slots are available in each semester?",["One","Two","Three","None"],1],["What percentage of faculty must remain available during vacation?",["25%","50%","75%","100%"],1],["Can unused vacation leave be carried forward to the next year?",["Yes","No"],1],["What is the conversion rate of unavailed vacation into Earned Leave?",["1:1","1:2","2:1","Not Convertible"],1]];
    const quiz=document.getElementById("quiz"),progressText=document.getElementById("progressText"),progressBar=document.getElementById("progressBar"),result=document.getElementById("result"),actionText=document.getElementById("actionText");
    questions.forEach(([question,choices],i)=>{const card=document.createElement("section");card.className="question";card.dataset.index=i;card.innerHTML=`<h2><span class="number">${i+1}</span><span>${question}</span></h2><div class="options">${choices.map((choice,j)=>`<label class="option"><input type="radio" name="q${i}" value="${j}"><span>${String.fromCharCode(65+j)}. ${choice}</span></label>`).join("")}</div><div class="answer-note">Correct answer: <strong>${String.fromCharCode(65+questions[i][2])}. ${choices[questions[i][2]]}</strong></div>`;quiz.appendChild(card);});
    function update(){const answered=questions.filter((_,i)=>quiz.querySelector(`input[name="q${i}"]:checked`)).length;progressText.textContent=`${answered} of ${questions.length} answered`;progressBar.style.width=`${answered/questions.length*100}%`;actionText.textContent=answered===questions.length?"All questions answered. You can submit now.":`${questions.length-answered} question${questions.length-answered===1?"":"s"} remaining.`;}
    quiz.addEventListener("change",e=>{if(e.target.matches("input")){e.target.closest(".options").querySelectorAll(".option").forEach(x=>x.classList.remove("selected"));e.target.closest(".option").classList.add("selected");update();}});
    document.getElementById("submit").onclick=()=>{let score=0,firstMissing=null;questions.forEach((q,i)=>{const card=quiz.querySelector(`[data-index="${i}"]`),selected=card.querySelector("input:checked");card.classList.add("reviewed");card.querySelectorAll(".option").forEach((option,j)=>{option.classList.remove("correct","incorrect");if(j===q[2])option.classList.add("correct");if(selected&&j===+selected.value&&j!==q[2])option.classList.add("incorrect");});if(selected&&+selected.value===q[2])score++;if(!selected&&!firstMissing)firstMissing=card;});result.classList.add("show");result.innerHTML=`<strong>${score} / ${questions.length}</strong><span>${score>=(questions.length*0.8)?"Excellent understanding of the policy.":score>=(questions.length*0.6)?"Good effort. Review the highlighted answers before continuing.":"Please review the policy and correct answers, then try again."}</span>`;result.scrollIntoView({behavior:"smooth",block:"center"});
    try { window.parent.postMessage({ action: "quiz_submitted", score: score, total: questions.length }, "*"); } catch(e) {}
    };
    document.getElementById("reset").onclick=()=>{quiz.reset();quiz.querySelectorAll(".question").forEach(card=>card.classList.remove("reviewed"));quiz.querySelectorAll(".option").forEach(x=>x.classList.remove("selected","correct","incorrect"));result.classList.remove("show");update();window.scrollTo({top:0,behavior:"smooth"});};update();
  </script>
</body>
</html>
