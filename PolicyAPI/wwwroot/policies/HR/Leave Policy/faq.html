<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leave Policy FAQs</title>
  <style>
    :root{--navy:#092a5e;--blue:#0b63e6;--teal:#078b91;--muted:#5e718e;--line:#d8e4f1;--soft:#f4f8fd;--white:#fff}
    *{box-sizing:border-box}body{margin:0;color:var(--navy);background:#f6f9fd;font-family:"Plus Jakarta Sans","Segoe UI",Arial,sans-serif;-webkit-font-smoothing:antialiased}
    .page{max-width:1100px;margin:auto;padding:26px}.hero{position:relative;display:flex;align-items:center;gap:20px;padding:24px 28px;overflow:hidden;border-radius:16px;color:#fff;background:linear-gradient(125deg,#0a3264 0%,#075f78 62%,#078f8d 100%);box-shadow:0 12px 28px #123c6a22}.hero:after{content:"";position:absolute;right:-42px;top:-65px;width:190px;height:190px;border:35px solid #ffffff12;border-radius:50%}
    .hero-icon{display:grid;width:60px;height:60px;flex:0 0 60px;place-items:center;border-radius:15px;color:#fff;background:#ffffff18;border:1px solid #ffffff30;box-shadow:inset 0 1px #ffffff35}.hero-icon svg{width:31px;fill:none;stroke:currentColor;stroke-width:2}.hero h1{margin:0;font-size:27px;letter-spacing:-.35px}.hero p{margin:6px 0 0;color:#e4f4fa;font-size:15px;line-height:1.5}
    .toolbar{display:flex;align-items:center;justify-content:space-between;gap:18px;margin:20px 0}.search{display:flex;align-items:center;gap:11px;flex:1;max-width:610px;height:48px;padding:0 16px;border:1px solid #ccdbea;border-radius:11px;background:#fff;box-shadow:0 4px 14px #173b6810;transition:.2s}.search:focus-within{border-color:#5b9bea;box-shadow:0 0 0 3px #0b63e612}.search svg{width:21px;fill:none;stroke:#537092;stroke-width:2}.search input{width:100%;border:0;outline:0;font:inherit;font-size:14.5px;color:var(--navy);background:transparent}.count{padding:7px 12px;color:#285477;font-size:13px;font-weight:700;border:1px solid #d6e4f2;border-radius:999px;background:#fff}
    .faq-section{margin:16px 0}.section-title{display:flex;align-items:center;gap:11px;margin:0 0 11px;padding:0 3px;color:#274b73;font-size:15px;font-weight:700}.section-title span{display:grid;min-width:30px;height:27px;padding:0 7px;place-items:center;border-radius:8px;color:#fff;font-size:11px;background:linear-gradient(135deg,#1269e9,#0756c9)}
    .faq{margin:9px 0;overflow:hidden;border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:0 3px 12px #173b680a;transition:border-color .2s,box-shadow .2s,transform .2s}.faq:hover{border-color:#b8cee6;box-shadow:0 7px 20px #173b6812}.faq.open{border-color:#8eb9ee;box-shadow:0 8px 22px #0b63e614}.question{display:flex;width:100%;align-items:center;justify-content:space-between;gap:18px;padding:15px 17px;color:var(--navy);font:inherit;font-size:15.5px;font-weight:600;text-align:left;cursor:pointer;border:0;background:#fff}.question:hover{background:#fbfdff}.question-copy{display:flex;align-items:center;gap:13px}.question-number{display:grid;width:31px;height:31px;flex:0 0 31px;place-items:center;color:#0b63e6;font-size:12.5px;font-weight:700;border-radius:9px;background:#edf5ff}.question svg{width:29px;height:29px;padding:7px;flex:0 0 29px;fill:none;stroke:#56779a;stroke-width:2;border-radius:50%;background:#f2f6fb;transition:.2s}.faq.open .question{color:#074fae;background:#f8fbff}.faq.open .question svg{color:#fff;stroke:#fff;background:#0b63e6;transform:rotate(180deg)}
    .answer{display:none;margin:0 17px 17px 61px;padding:14px 17px;color:#405a78;font-size:14.5px;line-height:1.7;border-left:3px solid #18a3a0;border-radius:0 9px 9px 0;background:#f3faf9}.faq.open .answer{display:block;animation:reveal .2s ease-out}@keyframes reveal{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}.empty{padding:45px;text-align:center;color:var(--muted);border:1px dashed #bfcfe1;border-radius:13px;background:#fff}
    @media(max-width:650px){.page{padding:14px}.hero{align-items:flex-start;padding:20px}.hero-icon{width:50px;height:50px;flex-basis:50px}.hero h1{font-size:21px}.toolbar{align-items:stretch;flex-direction:column;margin:15px 0}.search{max-width:none}.count{align-self:flex-start}.question{padding:13px;font-size:14px}.question-copy{gap:9px}.answer{margin:0 13px 14px;padding:12px 14px}.section-title{padding:0}}
  </style>
</head>
<body>
  <main class="page">
    <header class="hero"><div class="hero-icon"><svg viewBox="0 0 24 24"><path d="M5 5h14v11H8l-3 3z"/><path d="M9 9h6M9 12h4"/></svg></div><div><h1>Leave Policy FAQs</h1><p>Frequently Asked Questions regarding the Leave Policy.</p></div></header>
    <div class="toolbar"><label class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><path d="m16 16 4 4"/></svg><input id="search" type="search" placeholder="Search questions or answers..." aria-label="Search FAQs"></label><span class="count" id="count"></span></div>
    <div id="content"></div>
  </main>
  <script>
    const sections = [["Leave Policy FAQs",[["Can an employee claim leave as a matter of right?","No. Leave cannot be claimed as a matter of right. It is subject to approval by the competent authority."],["Who approves leave applications?","Leave applications must be recommended by the Head of the Department (HoD) and approved by the designated sanctioning authority."],["Can leave be taken during the notice period after resignation?","Only Casual Leave (CL) and Earned Leave (EL) can be availed during the notice period, and the notice period will be extended accordingly."],["Can leave be sanctioned beyond the retirement date?","No. Leave cannot be granted beyond the employee's retirement date."],["How many Casual Leaves are available in a year?","A confirmed employee is entitled to 13 Casual Leaves per calendar year."],["How are Casual Leaves credited?","Six (6) CLs are available from January to June and seven (7) CLs from July to December."],["What is the minimum and maximum duration of Casual Leave?","The minimum duration is half a day and the maximum is three consecutive days."],["Can Casual Leave be combined with Earned Leave or Medical Leave?","No. Casual Leave cannot normally be combined with Earned Leave, Medical Leave, or Compensatory Holiday."],["Can half-day Casual Leave be availed on half-working days?","No."],["When is Special Casual Leave granted?","For seminars, workshops, conferences, paper presentations, university duties, and approved academic activities."],["Is proof required after availing Special Casual Leave?","Yes. Attendance certificates and event reports must be submitted."],["Can Special Casual Leave be combined with other leaves?","Yes, subject to the policy conditions."],["Who is eligible for Earned Leave?","Eligible employees as per the institutional leave policy."],["Can Earned Leave be accumulated?","Yes. Earned Leave can be accumulated and carried forward."],["What is the minimum duration for availing Earned Leave?","Three days."],["Can Earned Leave be encashed?","Yes. Encashment of at least 30 days is allowed once in three years, subject to eligibility conditions."],["Is a medical certificate mandatory?","Yes. A valid medical certificate must be submitted for Medical Leave."],["Can Medical Leave be combined with other leave types?","Yes, as permitted under the leave rules."],["What happens if an employee does not produce a medical certificate?","The leave may not be treated as Medical Leave and may be adjusted against other eligible leave."],["What is Half Pay Leave?","It is leave during which the employee receives half of the eligible salary."],["Can Half Pay Leave be carried forward?","No."],["Can Half Pay Leave be combined with other leave types?","Yes, except Special Casual Leave."],["Who is eligible for Sabbatical Leave?","Eligible faculty members who satisfy the prescribed conditions and obtain management approval."],["What is the purpose of Sabbatical Leave?","To pursue higher studies, Ph.D., research projects, or professional development."],["Is a bond required for Sabbatical Leave?","Yes. Employees are required to execute a bond as prescribed by the institution."],["Who is eligible for Maternity Leave?","Confirmed female employees who have completed one year after probation."],["How many days of Maternity Leave are available?","90 days."],["What salary is payable during Maternity Leave?","Leave salary equal to 65% of the last drawn Gross Pay, subject to statutory deductions."],["Who can apply for Extraordinary Leave?","Confirmed employees who have completed the required service, subject to approval."],["Is salary paid during Extraordinary Leave?","No. It is Leave Without Pay (LWP)."],["Can an employee work elsewhere while on leave?","No. Employees cannot undertake employment, consultancy, or any professional work during leave without written permission."],["Are contract employees eligible for all leave types?","No. They are generally entitled only to Casual Leave as specified in the policy."],["How many Casual Leaves are available to contract or part-time employees?","Ten days per calendar year (5 days from January-June and 5 days from July-December)."],["What happens in case of unauthorized absence?","Unauthorized absence may lead to disciplinary action."],["Can the institution refuse a leave application?","Yes. Leave approval depends on institutional requirements and the sanctioning authority."],["Can the Head of Department recommend leave without arranging class substitutions?","No. The HoD must ensure that suitable arrangements are made before recommending leave."]]]];
    const content=document.getElementById("content"),search=document.getElementById("search"),count=document.getElementById("count");
    function render(term=""){const value=term.trim().toLowerCase();let shown=0,questionNumber=0;content.innerHTML="";sections.forEach(([title,items],sectionIndex)=>{const numberedItems=items.map(([q,a])=>[q,a,++questionNumber]);const matches=numberedItems.filter(([q,a])=>!value||(q+" "+a+" "+title).toLowerCase().includes(value));if(!matches.length)return;shown+=matches.length;const section=document.createElement("section");section.className="faq-section";section.innerHTML=`<h2 class="section-title"><span>${String(sectionIndex+1).padStart(2,"0")}</span>${title}</h2>`;matches.forEach(([q,a,number])=>{const cleanQuestion=q.replace(/^\s*\d+[.)]\s*/,"");const item=document.createElement("div");item.className="faq"+(value?" open":"");item.innerHTML=`<button class="question" type="button" aria-expanded="${value?"true":"false"}"><span class="question-copy"><span class="question-number">${number}.</span><span>${cleanQuestion}</span></span><svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg></button><div class="answer">${a}</div>`;item.querySelector("button").onclick=()=>{item.classList.toggle("open");item.querySelector("button").setAttribute("aria-expanded",item.classList.contains("open"));};section.appendChild(item);});content.appendChild(section);});count.textContent=`${shown} FAQ${shown===1?"":"s"}`;if(!shown)content.innerHTML='<div class="empty">No matching FAQs found.</div>';}
    search.addEventListener("input",e=>render(e.target.value));render();
  </script>
</body>
</html>
